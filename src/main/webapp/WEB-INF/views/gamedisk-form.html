<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Game Disk Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h2>Game Disk Form</h2>
<form th:action="${gameDTO.id == null ? '/games/save' : '/games/update'}" th:object="${gameDTO}" method="post" enctype="multipart/form-data">
    <input type="hidden" th:field="*{id}">
    <div class="mb-3">
        <label>Title</label>
        <input type="text" class="form-control" th:field="*{title}">
        <div class="text-danger" th:errors="*{title}"></div>
    </div>

    <div class="mb-3">
        <label>Genre</label>
        <input type="text" class="form-control" th:field="*{genre}">
        <div class="text-danger" th:errors="*{genre}"></div>
    </div>

    <div class="mb-3">
        <label>Quantity</label>
        <input type="number" class="form-control" th:field="*{quantity}">
        <div class="text-danger" th:errors="*{quantity}"></div>
    </div>

    <div class="mb-3">
        <label>Image</label>
        <input type="file" class="form-control" th:field="*{coverImage}">
    </div>

    <button class="btn btn-success">Save</button>
    <a th:href="@{/games}" class="btn btn-secondary">
        Back
    </a>
</form>
</body>
</html>
