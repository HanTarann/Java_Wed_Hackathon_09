<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Game Disk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">
<h2 class="mb-3">Danh sách Game Disk</h2>
<form class="row mb-3" method="get" th:action="@{/games}">
    <div class="col-md-4">
        <input type="text" class="form-control" name="title"
               placeholder="Tìm theo tên game"
               th:value="${title}">
    </div>

    <div class="col-md-3">
        <input type="text" class="form-control" name="genre"
               placeholder="Thể loại"
               th:value="${genre}">
    </div>

    <div class="col-md-2">
        <button class="btn btn-success">Search</button>
    </div>

    <div class="col-md-3 text-end">
        <a class="btn btn-primary" th:href="@{/games/create}">
            Add Game
        </a>
    </div>

</form>

<table class="table table-bordered table-hover">
    <thead class="table-dark">
    <tr>
        <th>STT</th>
        <th>Title</th>
        <th>Genre</th>
        <th>Quantity</th>
        <th>Image</th>
        <th>Action</th>
    </tr>
    </thead>

    <tbody>
    <tr th:if="${#lists.isEmpty(games)}">
        <td colspan="6" class="text-center text-danger">
            Không có game nào
        </td>
    </tr>

    <tr th:each="g, i : ${games}">
        <td th:text="${i.count}"></td>
        <td th:text="${g.title}"></td>
        <td th:text="${g.genre}"></td>
        <td th:text="${g.quantity}"></td>

        <td>
            <img th:if="${g.image != null}"
                 th:src="@{'/uploads/' + ${g.image}}"
                 width="60">

            <img th:unless="${g.image != null}"
                 th:src="@{/resources/images/default.jpg}"
                 width="60">
        </td>

        <td>
            <a class="btn btn-warning btn-sm"
               th:href="@{/games/edit/{id}(id=${g.id})}">
                Update
            </a>

            <a class="btn btn-danger btn-sm"
               th:href="@{/games/delete/{id}(id=${g.id})}"
               onclick="return confirm('Xóa game này?')">
                Delete
            </a>
        </td>

    </tr>
    </tbody>
</table>
</body>
</html>
